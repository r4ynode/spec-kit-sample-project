openapi: 3.0.0
info:
  title: Simple Task Management API
  version: 1.0.0
  description: A simple RESTful API to manage tasks.

paths:
  /tasks:
    get:
      summary: List all tasks
      responses:
        '200':
          description: A list of tasks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewTask'
      responses:
        '201':
          description: The created task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{id}:
    put:
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTask'
      responses:
        '200':
          description: The updated task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
    delete:
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Task deleted successfully.

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Buy milk"
        completed:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2025-09-30T10:00:00Z"

    NewTask:
      type: object
      properties:
        title:
          type: string
          example: "Walk the dog"

    UpdateTask:
      type: object
      properties:
        title:
          type: string
          example: "Walk the dog in the park"
        completed:
          type: boolean
          example: true
